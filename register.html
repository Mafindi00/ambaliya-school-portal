<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Student</title>
<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h2>Register Student</h2>
  <form id="registrationForm">
    <div class="mb-3"><label>Name</label><input type="text" name="name" class="form-control" required></div>
    <div class="mb-3"><label>Age</label><input type="number" name="age" class="form-control" required></div>
    <div class="mb-3"><label>Class</label><input type="text" name="class" class="form-control" required></div>
    <div class="mb-3"><label>Phone</label><input type="text" name="phone" class="form-control" required></div>
    <button type="submit" class="btn btn-primary">Register</button>
  </form>
  <p id="message" class="mt-3"></p>
</div>

<script>
const form = document.getElementById('registrationForm');
const message = document.getElementById('message');

form.addEventListener('submit', async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(form).entries());
  const res = await fetch('/register', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(data)
  });
  const result = await res.json();
  message.innerText = result.message;
  form.reset();
});
</script>
</body>
</html>
